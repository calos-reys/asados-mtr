<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Pedidos</title>
  <style>
    :root{
      --naranja:#e0651a;
      --naranja-oscuro:#b84e10;
      --verde:#2f9e44;
      --fondo:#faf6f1;
      --texto:#2b2320;
      --gris:#8a8078;
      --borde:#e8ddd1;
    }
    *{box-sizing:border-box;}
    body{
      font-family:'Segoe UI', Roboto, Arial, sans-serif;
      background:var(--fondo);
      color:var(--texto);
      margin:0;
      padding:0 0 90px 0;
    }
    header{
      background:var(--naranja);
      color:#fff;
      padding:18px 16px;
      text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,.15);
    }
    header h1{margin:0;font-size:1.3em;}
    header p{margin:4px 0 0;font-size:.85em;opacity:.9;}
    .contenedor{
      max-width:600px;
      margin:0 auto;
      padding:16px;
    }
    .categoria{
      margin-top:22px;
      margin-bottom:10px;
      font-size:1.05em;
      font-weight:600;
      color:var(--naranja-oscuro);
      border-bottom:2px solid var(--borde);
      padding-bottom:4px;
    }
    .producto{
      background:#fff;
      border:1px solid var(--borde);
      border-radius:12px;
      padding:10px;
      margin-bottom:10px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .producto img{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:10px;
      flex-shrink:0;
      background:#f1e9de;
    }
    .producto-info{flex:1;min-width:0;}
    .producto-info b{display:block;font-size:1em;}
    .producto-info span{color:var(--gris);font-size:.88em;}
    .btn-agregar{
      background:var(--naranja);
      color:#fff;
      border:none;
      border-radius:8px;
      padding:9px 14px;
      font-size:.9em;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn-agregar:active{background:var(--naranja-oscuro);}

    /* Barra flotante del carrito */
    .barra-carrito{
      position:fixed;
      bottom:0;left:0;right:0;
      background:var(--naranja-oscuro);
      color:#fff;
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
      box-shadow:0 -2px 8px rgba(0,0,0,.2);
    }
    .barra-carrito b{font-size:1.05em;}
    .barra-carrito span{font-size:.85em;opacity:.9;}

    /* Modales */
    .overlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,.45);
      z-index:50;
      align-items:flex-end;
      justify-content:center;
    }
    .overlay.activo{display:flex;}
    .hoja{
      background:#fff;
      width:100%;
      max-width:600px;
      border-radius:16px 16px 0 0;
      padding:18px;
      max-height:85vh;
      overflow-y:auto;
      animation:subir .2s ease-out;
    }
    @keyframes subir{
      from{transform:translateY(30px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }
    .hoja h2{margin-top:0;font-size:1.1em;color:var(--naranja-oscuro);}
    .cerrar{
      float:right;
      background:none;
      border:none;
      font-size:1.3em;
      color:var(--gris);
      cursor:pointer;
    }
    .imagen-modal{
      width:100%;
      max-height:160px;
      object-fit:cover;
      border-radius:10px;
      margin-bottom:12px;
      background:#f1e9de;
    }
    .campo{margin-bottom:14px;}
    .campo label{display:block;font-size:.85em;color:var(--gris);margin-bottom:5px;}
    .opciones-acomp{display:flex;gap:8px;}
    .opciones-acomp label{
      flex:1;
      border:1px solid var(--borde);
      border-radius:8px;
      padding:8px;
      text-align:center;
      font-size:.85em;
      cursor:pointer;
      color:var(--texto);
    }
    .opciones-acomp input{display:none;}
    .opciones-acomp label.seleccionado{
      border-color:var(--naranja);
      background:#fff3ea;
      font-weight:700;
    }
    .cantidad-selector{
      display:flex;align-items:center;gap:12px;
    }
    .cantidad-selector button{
      width:36px;height:36px;
      border-radius:50%;
      border:1px solid var(--borde);
      background:#fff;
      font-size:1.1em;
      cursor:pointer;
    }
    .cantidad-selector span{min-width:24px;text-align:center;font-weight:600;}
    .btn-confirmar{
      width:100%;
      background:var(--naranja);
      color:#fff;
      border:none;
      border-radius:10px;
      padding:13px;
      font-size:1em;
      font-weight:600;
      cursor:pointer;
      margin-top:6px;
    }
    .btn-confirmar:disabled{background:#d9cfc2;cursor:not-allowed;}

    /* Carrito */
    .item-carrito{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:10px 0;
      border-bottom:1px solid var(--borde);
    }
    .item-carrito .desc b{display:block;}
    .item-carrito .desc span{color:var(--gris);font-size:.85em;}
    .quitar{
      background:none;
      border:none;
      color:#c0392b;
      font-size:.85em;
      cursor:pointer;
      text-decoration:underline;
    }
    .total-linea{
      display:flex;justify-content:space-between;
      font-size:1.15em;font-weight:700;
      margin-top:14px;padding-top:10px;
      border-top:2px solid var(--borde);
    }
    .entrega-opciones{display:flex;gap:10px;margin-bottom:14px;}
    .entrega-opciones label{
      flex:1;
      border:1px solid var(--borde);
      border-radius:10px;
      padding:12px;
      text-align:center;
      cursor:pointer;
    }
    .entrega-opciones label.seleccionado{
      border-color:var(--verde);
      background:#eefaf0;
      font-weight:600;
    }
    .entrega-opciones input{display:none;}
    textarea, input[type=text]{
      width:100%;
      padding:10px;
      border:1px solid var(--borde);
      border-radius:8px;
      font-size:.95em;
      font-family:inherit;
    }
    .vacio{
      text-align:center;
      color:var(--gris);
      padding:20px 0;
    }
    .aviso-guardado{
      font-size:.8em;
      color:var(--verde);
      text-align:center;
      margin-top:8px;
      min-height:16px;
    }
  </style>
</head>
<body>

  <header>
    <h1>🍢 Haz tu pedido</h1>
    <p>Picadas, pinchos y culatas - Recoge en el punto o pide a domicilio</p>
  </header>

  <div class="contenedor" id="catalogo"></div>

  <div class="barra-carrito" id="barraCarrito" style="display:none" onclick="abrirCarrito()">
    <span id="resumenBarra">0 productos</span>
    <b id="totalBarra">$0</b>
  </div>

  <!-- Modal: agregar producto -->
  <div class="overlay" id="overlayProducto">
    <div class="hoja">
      <button class="cerrar" onclick="cerrarModal('overlayProducto')">✕</button>
      <img class="imagen-modal" id="imagenProducto" src="" alt="">
      <h2 id="tituloProducto">Producto</h2>

      <div class="campo">
        <label>Acompañante</label>
        <div class="opciones-acomp" id="opcionesAcomp">
          <label data-valor="Ninguno" class="seleccionado" onclick="elegirAcompanante('Ninguno')"><span>Ninguno</span></label>
          <label data-valor="Bollos" onclick="elegirAcompanante('Bollos')"><span>Bollos</span></label>
          <label data-valor="Patacones" onclick="elegirAcompanante('Patacones')"><span>Patacones</span></label>
        </div>
      </div>

      <div class="campo">
        <label>Cantidad</label>
        <div class="cantidad-selector">
          <button onclick="cambiarCantidad(-1)">−</button>
          <span id="cantidadActual">1</span>
          <button onclick="cambiarCantidad(1)">+</button>
        </div>
      </div>

      <button class="btn-confirmar" onclick="confirmarAgregar()">Agregar al carrito</button>
    </div>
  </div>

  <!-- Modal: carrito -->
  <div class="overlay" id="overlayCarrito">
    <div class="hoja">
      <button class="cerrar" onclick="cerrarModal('overlayCarrito')">✕</button>
      <h2>Tu pedido</h2>
      <div id="listaCarrito"></div>
      <div class="total-linea">
        <span>Total</span>
        <span id="totalCarrito">$0</span>
      </div>
      <button class="btn-confirmar" id="btnIrEntrega" onclick="irAEntrega()" style="margin-top:16px;">Continuar</button>
    </div>
  </div>

  <!-- Modal: entrega -->
  <div class="overlay" id="overlayEntrega">
    <div class="hoja">
      <button class="cerrar" onclick="cerrarModal('overlayEntrega')">✕</button>
      <h2>¿Cómo quieres tu pedido?</h2>

      <div class="entrega-opciones" id="opcionesEntrega">
        <label data-valor="Recoger en el punto" class="seleccionado" onclick="elegirEntrega('Recoger en el punto')"><span>🏠 Recoger en el punto</span></label>
        <label data-valor="Domicilio" onclick="elegirEntrega('Domicilio')"><span>🛵 Domicilio</span></label>
      </div>

      <div class="campo" id="campoDireccion" style="display:none">
        <label>Dirección de entrega</label>
        <textarea id="direccion" rows="2" placeholder="Barrio, calle, referencia..."></textarea>
      </div>

      <div class="campo">
        <label>Nombre de quien recibe</label>
        <input type="text" id="nombreCliente" placeholder="Tu nombre">
      </div>

      <button class="btn-confirmar" id="btnEnviar" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
      <div class="aviso-guardado" id="avisoGuardado"></div>
    </div>
  </div>

<script>
  // ---------- Catálogo ----------
  // Puedes cambiar "imagen" por la URL de tu propia foto (ver instrucciones
  // al final del mensaje de Claude sobre cómo subir tus fotos).
  const productos = [
    { id:'picada_peq', nombre:'Picada de chorizo pequeña', precio:7000,  categoria:'Picadas de chorizo',
      imagen:'https://placehold.co/200x200/e0651a/ffffff?text=Picada+Peque%C3%B1a' },
    { id:'picada_med', nombre:'Picada de chorizo mediana',  precio:14000, categoria:'Picadas de chorizo',
      imagen:'https://placehold.co/200x200/e0651a/ffffff?text=Picada+Mediana' },
    { id:'picada_gra', nombre:'Picada de chorizo grande',   precio:24000, categoria:'Picadas de chorizo',
      imagen:'https://placehold.co/200x200/e0651a/ffffff?text=Picada+Grande' },
    { id:'pincho_cerdo', nombre:'Pincho de cerdo', precio:8000, categoria:'Pinchos',
      imagen:'https://placehold.co/200x200/b84e10/ffffff?text=Pincho+Cerdo' },
    { id:'pincho_res',   nombre:'Pincho de res',   precio:8000, categoria:'Pinchos',
      imagen:'https://placehold.co/200x200/b84e10/ffffff?text=Pincho+Res' },
    { id:'culata_cerdo', nombre:'Culata de cerdo', precio:12000, categoria:'Culatas',
      imagen:'https://placehold.co/200x200/8a3d0f/ffffff?text=Culata+Cerdo' }
  ];

  const NUMERO_WHATSAPP = '573192548485'; // +57 319 254 8485 sin signos ni espacios

  let carrito = [];       // {id, nombre, precio, cantidad, acompanante}
  let productoTemporal = null;
  let cantidadTemporal = 1;
  let acompananteTemporal = 'Ninguno';
  let entregaTemporal = 'Recoger en el punto';

  function formatoPesos(valor){
    return '$' + valor.toLocaleString('es-CO');
  }

  // ---------- Render catálogo ----------
  function renderCatalogo(){
    const cont = document.getElementById('catalogo');
    cont.innerHTML = '';
    const categorias = [...new Set(productos.map(p => p.categoria))];

    categorias.forEach(cat => {
      const titulo = document.createElement('div');
      titulo.className = 'categoria';
      titulo.textContent = cat;
      cont.appendChild(titulo);

      productos.filter(p => p.categoria === cat).forEach(p => {
        const div = document.createElement('div');
        div.className = 'producto';
        div.innerHTML = `
          <img src="${p.imagen}" alt="${p.nombre}">
          <div class="producto-info">
            <b>${p.nombre}</b>
            <span>${formatoPesos(p.precio)}</span>
          </div>
          <button class="btn-agregar" onclick="abrirModalProducto('${p.id}')">Agregar</button>
        `;
        cont.appendChild(div);
      });
    });
  }

  // ---------- Modal producto ----------
  function abrirModalProducto(id){
    productoTemporal = productos.find(p => p.id === id);
    cantidadTemporal = 1;
    acompananteTemporal = 'Ninguno';

    document.getElementById('imagenProducto').src = productoTemporal.imagen;
    document.getElementById('tituloProducto').textContent =
      productoTemporal.nombre + ' - ' + formatoPesos(productoTemporal.precio);
    document.getElementById('cantidadActual').textContent = cantidadTemporal;

    document.querySelectorAll('#opcionesAcomp label').forEach(lbl => {
      lbl.classList.toggle('seleccionado', lbl.dataset.valor === 'Ninguno');
    });

    abrirModal('overlayProducto');
  }

  function elegirAcompanante(valor){
    acompananteTemporal = valor;
    document.querySelectorAll('#opcionesAcomp label').forEach(lbl => {
      lbl.classList.toggle('seleccionado', lbl.dataset.valor === valor);
    });
  }

  function cambiarCantidad(delta){
    cantidadTemporal = Math.max(1, cantidadTemporal + delta);
    document.getElementById('cantidadActual').textContent = cantidadTemporal;
  }

  function confirmarAgregar(){
    carrito.push({
      id: productoTemporal.id,
      nombre: productoTemporal.nombre,
      precio: productoTemporal.precio,
      cantidad: cantidadTemporal,
      acompanante: acompananteTemporal
    });
    cerrarModal('overlayProducto');
    actualizarBarraCarrito();
  }

  // ---------- Carrito ----------
  function actualizarBarraCarrito(){
    const barra = document.getElementById('barraCarrito');
    if (carrito.length === 0){
      barra.style.display = 'none';
      return;
    }
    barra.style.display = 'flex';
    const totalItems = carrito.reduce((s, i) => s + i.cantidad, 0);
    const total = calcularTotal();
    document.getElementById('resumenBarra').textContent = totalItems + (totalItems === 1 ? ' producto' : ' productos');
    document.getElementById('totalBarra').textContent = formatoPesos(total);
  }

  function calcularTotal(){
    return carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
  }

  function renderCarrito(){
    const cont = document.getElementById('listaCarrito');
    if (carrito.length === 0){
      cont.innerHTML = '<div class="vacio">Tu carrito está vacío</div>';
      document.getElementById('btnIrEntrega').disabled = true;
    } else {
      cont.innerHTML = '';
      carrito.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'item-carrito';
        div.innerHTML = `
          <div class="desc">
            <b>${item.cantidad} x ${item.nombre}</b>
            <span>Con: ${item.acompanante} · ${formatoPesos(item.precio * item.cantidad)}</span>
          </div>
          <button class="quitar" onclick="quitarDelCarrito(${idx})">Quitar</button>
        `;
        cont.appendChild(div);
      });
      document.getElementById('btnIrEntrega').disabled = false;
    }
    document.getElementById('totalCarrito').textContent = formatoPesos(calcularTotal());
  }

  function quitarDelCarrito(idx){
    carrito.splice(idx, 1);
    renderCarrito();
    actualizarBarraCarrito();
  }

  function abrirCarrito(){
    renderCarrito();
    abrirModal('overlayCarrito');
  }

  function irAEntrega(){
    if (carrito.length === 0) return;
    cerrarModal('overlayCarrito');
    abrirModal('overlayEntrega');
  }

  // ---------- Entrega ----------
  function elegirEntrega(valor){
    entregaTemporal = valor;
    document.querySelectorAll('#opcionesEntrega label').forEach(lbl => {
      lbl.classList.toggle('seleccionado', lbl.dataset.valor === valor);
    });
    document.getElementById('campoDireccion').style.display = (valor === 'Domicilio') ? 'block' : 'none';
  }

  function enviarPedido(){
    const direccion = document.getElementById('direccion').value.trim();
    const nombre = document.getElementById('nombreCliente').value.trim();

    if (entregaTemporal === 'Domicilio' && direccion === ''){
      alert('Por favor escribe la dirección de entrega.');
      return;
    }
    if (nombre === ''){
      alert('Por favor escribe tu nombre.');
      return;
    }

    const total = calcularTotal();

    // Armar mensaje de WhatsApp
    let mensaje = `🛒 *Nuevo pedido*\n\n`;
    mensaje += `*Cliente:* ${nombre}\n\n`;
    mensaje += `*Productos:*\n`;
    carrito.forEach(item => {
      mensaje += `• ${item.cantidad} x ${item.nombre} (con ${item.acompanante}) - ${formatoPesos(item.precio * item.cantidad)}\n`;
    });
    mensaje += `\n*Total: ${formatoPesos(total)}*\n\n`;
    mensaje += `*Entrega:* ${entregaTemporal}\n`;
    if (entregaTemporal === 'Domicilio'){
      mensaje += `*Dirección:* ${direccion}\n`;
    }

    // Abrir WhatsApp de inmediato (debe ser síncrono para que el navegador
    // no bloquee la ventana emergente)
    const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');

    // Guardar el registro de la venta en la hoja de cálculo (en segundo plano)
    const btn = document.getElementById('btnEnviar');
    const aviso = document.getElementById('avisoGuardado');
    btn.disabled = true;
    aviso.textContent = 'Guardando pedido...';

    const datosPedido = {
      cliente: nombre,
      tipoEntrega: entregaTemporal,
      direccion: entregaTemporal === 'Domicilio' ? direccion : '-',
      productos: carrito,
      total: total
    };

    google.script.run
      .withSuccessHandler(function(){
        aviso.textContent = '✔ Pedido guardado correctamente';
        btn.disabled = false;
        // Reiniciar todo después de enviar
        carrito = [];
        actualizarBarraCarrito();
        setTimeout(function(){
          cerrarModal('overlayEntrega');
          aviso.textContent = '';
          document.getElementById('direccion').value = '';
          document.getElementById('nombreCliente').value = '';
        }, 1200);
      })
      .withFailureHandler(function(error){
        aviso.textContent = '⚠ No se pudo guardar el registro, pero el pedido ya se envió por WhatsApp.';
        btn.disabled = false;
        console.error(error);
      })
      .guardarVenta(datosPedido);
  }

  // ---------- Utilidades modal ----------
  function abrirModal(id){
    document.getElementById(id).classList.add('activo');
  }
  function cerrarModal(id){
    document.getElementById(id).classList.remove('activo');
  }

  renderCatalogo();
</script>

</body>
</html>
